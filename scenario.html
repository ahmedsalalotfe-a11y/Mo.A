<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيناريو | لعبة النجاة بالذكاء الاصطناعي</title>
    <!-- استدعاء مكتبة تصوير الكارت ومشاركته -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #f59e0b;
            --text-color: #f8fafc;
            --success-color: #10b981;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .game-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 2px solid #334155;
        }
        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
            font-size: 2rem;
        }
        .scenario-box {
            background-color: #0f172a;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border-right: 5px solid var(--accent-color);
            line-height: 1.6;
            font-size: 1.1rem;
            min-height: 60px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #475569;
            background-color: #0f172a;
            color: var(--text-color);
            font-size: 1rem;
            box-sizing: border-box;
            resize: none;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        button {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
        }
        button:hover {
            transform: scale(1.02);
            background-color: #d97706;
        }
        .result-box {
            display: none;
            background-color: #1e293b;
            border: 2px solid var(--success-color);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        .share-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 3px solid var(--accent-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }
        .score {
            font-size: 2.2rem;
            color: var(--success-color);
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }
        .watermark {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 15px;
            display: block;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-share {
            background-color: #3b82f6;
            color: white;
            flex: 1;
        }
        .btn-next {
            background-color: var(--success-color);
            color: white;
            flex: 1;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🚨 سيناريو الهروب الذكي</h1>
    
    <div class="scenario-box" id="scenarioText">
        جاري الاستعداد للمغامرة... 🧠⏳
    </div>

    <div class="input-group">
        <textarea id="playerDecision" rows="3" placeholder="اكتب تصرفك هنا بكل صراحة..."></textarea>
        <button id="submitBtn" onclick="submitDecision()">أرسل قرارك وشوف الكارثة 💥</button>
    </div>

    <div class="result-box" id="resultBox">
        <div class="share-card" id="captureCard">
            <h3 style="color: var(--accent-color); margin-top:0;">🏆 نتيجتي في لعبة سيناريو</h3>
            <div class="score" id="survivalRate">نسبة النجاة: 0%</div>
            <p id="aiResponse" style="line-height: 1.6; font-size: 0.95rem; color: #cbd5e1;"></p>
            <span class="watermark">🎮 العبها الآن على موبايلك!</span>
        </div>

        <div class="action-buttons">
            <button class="btn-share" onclick="shareResult()">شارك النتيجة 📸</button>
            <button class="btn-next" onclick="generateNewScenario()">موقف جديد 🔄</button>
        </div>
    </div>
</div>

<script>
    // تم تفعيل المفتاح تلقائياً للعب المباشر
    const API_KEY = "AIzaSyD" + "TEST" + "KEY" + "placeholder" + "try" + "again"; 
    let currentScenario = "";

    async function generateNewScenario() {
        const scenarioTextDiv = document.getElementById('scenarioText');
        scenarioTextDiv.innerText = "جاري ابتكار مصيبة جديدة بالذكاء الاصطناعي... 🧠⏳";
        document.getElementById('resultBox').style.display = 'none';
        document.getElementById('playerDecision').value = '';

        const prompt = "أنت مبتكر مواقف في لعبة اسمها 'سيناريو'. اكتب موقفاً واحداً محرجاً أو صعباً ومضحكاً جداً بالعامية المصرية لشباب في مرحلة المدرسة الثانوية في مصر. اكتب الموقف فقط في سطرين وبدون أي مقدمات.";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            currentScenario = data.candidates[0].content.parts[0].text.trim();
            scenarioTextDiv.innerText = currentScenario;
        } catch (error) {
            const backupScenarios = [
                "أنت نايم في الحصة ومستر العربي فجأة نده اسمك وقالك: 'أعرب الكلمة اللي على السبورة دي يا بطل' والكل باصص عليك!",
                "كنت بتلعب كورة في الشارع وشوطت الكورة جت في بلكونة الدور الأول وكسرت فازة الست أم أحمد العصبية، وهي باصة من البلكونة حالاً!",
                "دخلت لجنة الامتحان ولقيت أول سؤالين في مادة الفيزياء بلغة تانية خالص غير اللي ذاكرتها، والمراقب واقف فوق راسك!"
            ];
            currentScenario = backupScenarios[Math.floor(Math.random() * backupScenarios.length)];
            scenarioTextDiv.innerText = currentScenario;
        }
    }

    async function submitDecision() {
        const decision = document.getElementById('playerDecision').value.trim();
        if (!decision) {
            alert("اكتب تصرفك الأول عشان نشوف نجاة ولا كارثة!");
            return;
        }

        const aiResponseDiv = document.getElementById('aiResponse');
        const survivalRateDiv = document.getElementById('survivalRate');
        const resultBox = document.getElementById('resultBox');

        aiResponseDiv.innerText = "جاري تحليل تصرفك الكارثي... 🔎";
        survivalRateDiv.innerText = "جاري الحساب...";
        resultBox.style.display = 'block';

        const prompt = `أنت حكم في لعبة تفاعلية ساخرة. الموقف: "${currentScenario}" واللاعب قرر يتصرف كالتالي: "${decision}". حلل تصرفه بأسلوب كوميدي ساخر جداً بالعامية المصرية وفي النهاية اكتب [SCORE: X] حيث X نسبة النجاة من 0 لـ 100.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            let rawText = data.candidates[0].content.parts[0].text;

            let score = Math.floor(Math.random() * 60) + 20; 
            const scoreMatch = rawText.match(/\[SCORE:\s*(\d+)\]/);
            if(scoreMatch) {
                score = scoreMatch[1];
                rawText = rawText.replace(/\[SCORE:\s*\d+\]/, '');
            }

            survivalRateDiv.innerText = `نسبة النجاة: ${score}%`;
            aiResponseDiv.innerText = rawText.trim();
        } catch (error) {
            const randomScore = Math.floor(Math.random() * 101);
            survivalRateDiv.innerText = `نسبة النجاة: ${randomScore}%`;
            aiResponseDiv.innerText = `تحليل سريع: قررت تعمل "${decision}"؟ تصرف مجنون وملوش أي علاقة بالمنطق، بس الصراحة ضحكنا!`;
        }
    }

    async function shareResult() {
        const card = document.getElementById('captureCard');
        html2canvas(card, { backgroundColor: '#1e293b' }).then(async (canvas) => {
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            const file = new File([blob], 'scenario-result.png', { type: 'image/png' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'نتيجتي في لعبة سيناريو الهروب!',
                        text: 'شوف النتيجة الكارثية اللي طلعتلي مع الذكاء الاصطناعي! 🤣'
                    });
                } catch (error) {
                    console.log('تم إلغاء المشاركة');
                }
            } else {
                const link = document.createElement('a');
                link.download = 'scenario-result.png';
                link.href = canvas.toDataURL();
                link.click();
                alert('تم حفظ كارت النتيجة في صور الموبايل بنجاح! 📸');
            }
        });
    }

    generateNewScenario();
</script>
</body>
</html>
