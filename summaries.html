<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة ملخصات الصف الثاني الثانوي 📚</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            color: #00f2fe;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 242, 254, 0.3);
        }
        .subtitle {
            color: #e0e0e0;
            font-size: 16px;
            margin-bottom: 30px;
        }
        /* صندوق البحث */
        .search-box {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            outline: none;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        /* أزرار الفلترة حسب المواد */
        .filter-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }
        .filter-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }
        .filter-btn.active, .filter-btn:hover {
            background: #00f2fe;
            color: #1e3c72;
            border-color: #00f2fe;
            font-weight: bold;
        }
        /* قائمة الملخصات */
        .summaries-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        @media (min-width: 600px) {
            .summaries-list {
                grid-template-columns: 1fr 1fr;
            }
        }
        .summary-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: right;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .summary-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .card-tag {
            display: inline-block;
            background: #00f2fe;
            color: #1e3c72;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #fff;
        }
        .download-btn {
            display: block;
            background: #2ed573;
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.2s;
        }
        .download-btn:hover {
            background: #26af5f;
            transform: scale(1.02);
        }
        .no-results {
            grid-column: 1 / -1;
            padding: 40px;
            color: #ccc;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 مكتبة ملخصات الصف الثاني الثانوي</h1>
    <p class="subtitle">منصتك الخاصة لرفع وتحميل المذكرات والملخصات بسهولة</p>

    <!-- صندوق البحث -->
    <input type="text" class="search-box" id="searchInput" placeholder="ابحث عن اسم الملخص أو المادة..." oninput="filterSummaries()">

    <!-- أزرار المواد -->
    <div class="filter-buttons">
        <button class="filter-btn active" onclick="filterBySubject('all', this)">الكل</button>
        <button class="filter-btn" onclick="filterBySubject('physics', this)">فيزياء</button>
        <button class="filter-btn" onclick="filterBySubject('chemistry', this)">كيمياء</button>
        <button class="filter-btn" onclick="filterBySubject('math', this)">رياضيات</button>
        <button class="filter-btn" onclick="filterBySubject('arabic', this)">عربي</button>
        <button class="filter-btn" onclick="filterBySubject('english', this)">إنجليزي</button>
    </div>

    <!-- شبكة عرض الملخصات -->
    <div class="summaries-list" id="summariesContainer">
        <!-- سيتم ملء الملخصات تلقائياً بواسطة الجافا سكريبت -->
    </div>
</div>

<script>
    // ⬇️ هنا قائمة ملخصاتك (تستطيع إضافة المزيد هنا مع الوقت بسهولة!) ⬇️
    const summariesData = [
        {
            title: "ملخص قوانين الفيزياء - الباب الأول",
            subject: "physics",
            subjectArabic: "فيزياء",
            link: "https://drive.google.com/open?id=ضع_رابط_ملف_جوجل_درايف_هنا"
        },
        {
            title: "مذكرة الكيمياء العضوية المبسطة",
            subject: "chemistry",
            subjectArabic: "كيمياء",
            link: "https://drive.google.com/open?id=رابط_الملخص_الثاني"
        },
        {
            title: "قوانين التفاضل والتكامل بالتفصيل",
            subject: "math",
            subjectArabic: "رياضيات",
            link: "https://drive.google.com/open?id=رابط_الملخص_الثالث"
        }
    ];

    let currentSubject = 'all';

    function displaySummaries(data) {
        const container = document.getElementById('summariesContainer');
        container.innerHTML = '';

        if(data.length === 0) {
            container.innerHTML = '<div class="no-results">لم يتم العثور على ملخصات تطابق بحثك.</div>';
            return;
        }

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'summary-card';
            card.innerHTML = `
                <div>
                    <span class="card-tag">${item.subjectArabic}</span>
                    <div class="card-title">${item.title}</div>
                </div>
                <a href="${item.link}" target="_blank" class="download-btn">تحميل أو مشاهدة 📥</a>
            `;
            container.appendChild(card);
        });
    }

    function filterSummaries() {
        const searchText = document.getElementById('searchInput').value.toLowerCase().trim();
        
        const filtered = summariesData.filter(item => {
            const matchesSearch = item.title.toLowerCase().includes(searchText) || item.subjectArabic.includes(searchText);
            const matchesSubject = currentSubject === 'all' || item.subject === currentSubject;
            return matchesSearch && matchesSubject;
        });

        displaySummaries(filtered);
    }

    function filterBySubject(subject, button) {
        currentSubject = subject;
        
        // تغيير شكل الأزرار النشطة
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');

        filterSummaries();
    }

    // عرض الكل عند بدء تشغيل الصفحة لأول مرة
    window.onload = () => displaySummaries(summariesData);
</script>

</body>
</html>
