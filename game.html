!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تخمين الكلمات البرمجية 🎮</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            box-sizing: border-box;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #00f2fe;
            text-shadow: 0 2px 10px rgba(0, 242, 254, 0.4);
        }
        .scrambled-word {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 5px;
            margin: 20px 0;
            color: #fff;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 10px;
        }
        .hint {
            font-size: 16px;
            color: #e0e0e0;
            margin-bottom: 20px;
            font-style: italic;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 8px;
        }
        #timer {
            color: #ff4757;
        }
        #score {
            color: #2ed573;
        }
        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .btn-check {
            background-color: #00f2fe;
            color: #1e3c72;
        }
        .btn-check:hover {
            background-color: #4facfe;
            transform: scale(1.02);
        }
        .btn-refresh {
            background-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .btn-refresh:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
        .msg {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 تخمين الكلمات البرمجية</h1>
    
    <div class="stats">
        <div class="stat-item">الوقت: <span id="timer">30</span>ث</div>
        <div class="stat-item">النقاط: <span id="score">0</span></div>
    </div>

    <div class="scrambled-word" id="scrambledWord">W O R D</div>
    <div class="hint" id="hintText">التلميح سيظهر هنا</div>

    <input type="text" id="userInput" placeholder="اكتب الكلمة الصحيحة هنا..." autocomplete="off" spellcheck="false">
    
    <button class="btn btn-check" onclick="checkWord()">تحقق من الإجابة</button>
    <button class="btn btn-refresh" onclick="initGame()">تغيير الكلمة 🔄</button>

    <div class="msg" id="msgText"></div>
</div>

<script>
    const words = [
        { word: "function", hint: "تُستخدم لإنشاء كتلة كود قابلة لإعادة الاستخدام" },
        { word: "variable", hint: "مكان في الذاكرة لتخزين البيانات (مثل var أو let)" },
        { word: "array", hint: "مصفوفة تستخدم لتخزين قائمة من العناصر" },
        { word: "document", hint: "كائن يمثل صفحة الويب في جافا سكريبت (DOM)" },
        { word: "object", hint: "نوع بيانات يحتوي على خصائص ووظائف (Properties & Methods)" },
        { word: "string", hint: "سلسلة من الحروف والنصوص محاطة بعلامات تنصيص" },
        { word: "loops", hint: "تُستخدم لتكرار تنفيذ الكود عدة مرات (مثل for أو while)" },
        { word: "const", hint: "كلمة محجوزة لتعريف متغير قيمته ثابتة لا تتغير" },
        { word: "window", hint: "الكائن الرئيسي للمتصفح الذي يحتوي على كل شيء" },
        { word: "boolean", hint: "نوع بيانات يحتمل قيمتين فقط: true أو false" }
    ];

    let correctWord, timer;
    let score = 0;
    let maxTime = 30;

    function startTimer(seconds) {
        clearInterval(timer);
        let timeLeft = seconds;
        document.getElementById('timer').innerText = timeLeft;

        timer = setInterval(() => {
            if(timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
            } else {
                clearInterval(timer);
                document.getElementById('msgText').style.color = "#ff4757";
                document.getElementById('msgText').innerText = `انتهى الوقت! الكلمة الصحيحة كانت (${correctWord.toUpperCase()})`;
                setTimeout(initGame, 3000);
            }
        }, 1000);
    }

    function initGame() {
        startTimer(maxTime);
        document.getElementById('msgText').innerText = "";
        document.getElementById('userInput').value = "";
        
        let randomObj = words[Math.floor(Math.random() * words.length)];
        correctWord = randomObj.word;
        
        let wordArray = randomObj.word.split("");
        for (let i = wordArray.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [wordArray[i], wordArray[j]] = [wordArray[j], wordArray[i]];
        }
        
        document.getElementById('scrambledWord').innerText = wordArray.join(" ");
        document.getElementById('hintText').innerText = `تلميح: ${randomObj.hint}`;
    }

    function checkWord() {
        let userVal = document.getElementById('userInput').value.toLowerCase().trim();
        if(!userVal) return alert("الرجاء كتابة كلمة أولاً!");

        if(userVal !== correctWord) {
            document.getElementById('msgText').style.color = "#ff4757";
            document.getElementById('msgText').innerText = `إجابة خاطئة! حاول مجدداً ❌`;
        } else {
            document.getElementById('msgText').style.color = "#2ed573";
            document.getElementById('msgText').innerText = `🎉 إجابة صحيحة! أحسنت 🎉`;
            score++;
            document.getElementById('score').innerText = score;
            clearInterval(timer);
            setTimeout(initGame, 1500);
        }
    }

    window.onload = initGame;
</script>

</body>
</html>
