<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُزخرف النصوص الاحترافي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus {
            border-color: #007bff;
        }
        .results-container {
            margin-top: 20px;
            text-align: right;
        }
        .result-item {
            background-color: #f8f9fa;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-right: 4px solid #007bff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
        }
        .copy-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .copy-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ زخرفة الأسماء والنصوص ✨</h1>
    <textarea id="inputText" placeholder="اكتب الكلمة أو الاسم هنا لزخرفته..." oninput="decorateText()"></textarea>
    
    <div class="results-container" id="results">
        <!-- ستظهر الزخارف هنا تلقائياً -->
    </div>
</div>

<script>
    function decorateText() {
        const text = document.getElementById('inputText').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';

        if (!text.trim()) return;

        // قوالب وأنماط الزخرفة (عربي وإنجليزي)
        const decorations = [
            `✨ ${text} ✨`,
            `👑 〖 ${text} 〗 👑`,
            `☠️ ╰ ${text} ╯ ☠️`,
            `★彡 ${text} 彡★`,
            `爪 ${text} 爪`,
            `『★』${text}『★』`,
            `々${text}々`,
            `•👈 ${text} 👉•`,
            `【 ${text} 】`,
            ` ꧁ ${text} ꧂`
        ];

        decorations.forEach(dec => {
            const item = document.createElement('div');
            item.className = 'result-item';
            
            const textSpan = document.createElement('span');
            textSpan.innerText = dec;
            
            const button = document.createElement('button');
            button.className = 'copy-btn';
            button.innerText = 'نسخ';
            button.onclick = () => {
                navigator.clipboard.writeText(dec);
                button.innerText = 'تم النسخ!';
                button.style.backgroundColor = '#007bff';
                setTimeout(() => {
                    button.innerText = 'نسخ';
                    button.style.backgroundColor = '#28a745';
                }, 1500);
            };

            item.appendChild(textSpan);
            item.appendChild(button);
            resultsDiv.appendChild(item);
        });
    }
</script>

</body>
</html>
